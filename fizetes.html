<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Webáruház - Fizetés</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <header class="bg-dark text-white py-3">
        <div class="container d-flex align-items-center justify-content-between flex-wrap">
            <p class="mb-0 fw-bold">Mini Webáruház - Főoldal</p>
                
            <div class="Hamburger" id="hamburger">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>

            <div class="nav-menu" id="nav-menu">
                <div class="mode-switch">
                    <img src="Images/moon.jpg" id="sotet" class="theme-icon moon" alt="Sötét mód">
                    <img src="Images/sun.jpg" id="vilagos" class="theme-icon sun" alt="Világos mód">
                </div>
                <a href="admin.html">
                    <img src="Images/admin-panel.jpg" alt="Admin panel" class="img-fluid" style="max-height:40px;">
                </a>
                <a href="kosar.html">
                    <img src="Images/kosar.jpg" alt="Kosár" class="img-fluid" style="max-height:40px;">
                </a>
            </div>
        </div>
    </header>
    <main>
        <div class="container py-5">
            <div class="row g-4">
                <div class="col-lg-6">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table align-middle">
                                    <thead>
                                        <tr>
                                            <th>Termék</th>
                                            <th>Ár</th>
                                            <th>Mennyiség</th>
                                            <th>Összesen</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody id="kosar-elemek">
                                        </tbody>
                                </table>
                            </div>
                            <div class="text-center">
                                <strong class="h5">Végösszeg:</strong>
                                <strong class="h5" id="vegosszeg">0 Ft</strong>
                            </div>
                        </div>
                    </div>
                    <a href="index.html" class="btn btn-link mt-3 p-0 text-decoration-none">
                        <i class="bi bi-arrow-left"></i> Vissza a vásárláshoz
                    </a>
                </div>
                
                <div class="col-lg-6">
                    <h1 class="mb-4 text-center">Fizetés</h1>
                    <p class="text-center mb-5">Köszönjük, hogy nálunk vásárolt! Kérem adja meg a fizetési adatokat.</p>
                    <p id="kosar-uzenet" class="text-center text-danger mb-3" style="display: none;">A kosarad üres, a fizetés nem lehetséges.</p>
                    <div class="row justify-content-center">
                        <div class="col-md-6">
                            <form id="payment-form" class="shadow-sm p-4 border rounded">
                                <div class="mb-3">
                                    <label for="card-number" class="form-label">Kártyaszám</label>
                                    <input type="text" id="card-number" class="form-control" placeholder="1234 5678 9012 3456" required>
                                </div>
                                <div class="mb-3">
                                    <label for="expiry-date" class="form-label">Lejárati dátum</label>
                                    <input type="text" id="expiry-date" class="form-control" placeholder="MM/YY" required>
                                </div>
                                <div class="mb-3">
                                    <label for="cvv" class="form-label">CVV</label>
                                    <input type="text" id="cvv" class="form-control" placeholder="123" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Fizetés</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        document.getElementById('payment-form').addEventListener('submit', function(e) {
            e.preventDefault();
            localStorage.removeItem('webshop_kosar');
            alert('Fizetés sikeres! A kosár kiürült.');
            window.location.href = 'index.html';
        });
    </script>
    <script src="JS/hamburger.js"></script>
    <script src="JS/kosar.js"></script>
</body>
</html>
