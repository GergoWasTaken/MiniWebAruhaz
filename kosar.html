<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Webáruház - Kosár</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <header class="bg-dark text-white py-3">
        <div class="container d-flex align-items-center justify-content-between flex-wrap">
            <p class="mb-0 fw-bold">Mini Webáruház - Kosár</p>
            
            <div class="Hamburger" id="hamburger">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>

            <div class="nav-menu" id="nav-menu">
                <div class="mode-switch">
                    <img src="Images/moon.jpg" id="sotet" class="theme-icon moon" alt="Sötét mód">
                    <img src="Images/sun.jpg" id="vilagos" class="theme-icon sun" alt="Világos mód">
                </div>
                <a href="index.html">
                    <img src="Images/home.jpg" alt="Főoldal" class="img-fluid" style="max-height:40px;">
                </a>
                <a href="admin.html">
                    <img src="Images/admin-panel.jpg" alt="Admin" class="img-fluid" style="max-height:40px;">
                </a>
            </div>
        </div>
    </header>

    <div class="container py-5">
        <h1 class="mb-4">Kosarad tartalma</h1>
        
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead>
                                    <tr>
                                        <th>Termék</th>
                                        <th>Ár</th>
                                        <th>Mennyiség</th>
                                        <th>Összesen</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="kosar-elemek">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <a href="index.html" class="btn btn-link mt-3 p-0 text-decoration-none">
                    <i class="bi bi-arrow-left"></i> Vissza a vásárláshoz
                </a>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Rendelés összesítése</h5>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Részösszeg</span>
                            <span id="reszosszeg">0 Ft</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Szállítás</span>
                            <span class="text-success">Ingyenes</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <strong class="h5">Végösszeg</strong>
                            <strong class="h5" id="vegosszeg">0 Ft</strong>
                        </div>
                        <a href="fizetes.html">
                            <button class="btn btn-primary w-100 btn-lg" id="fizetes-gomb">Tovább a pénztárhoz</button>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-5 mt-auto border-top">
        <div class="container text-center">
            <p class="mb-0 small text-secondary">&copy; 2026 Mini Webáruház</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/hamburger.js"></script>
    <script src="JS/kosar.js"></script>
</body>
</html>
